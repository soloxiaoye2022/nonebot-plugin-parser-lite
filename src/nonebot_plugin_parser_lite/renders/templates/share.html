<meta name="referrer" content="no-referrer" />
<link rel="stylesheet" href="https://cdn.bootcss.com/font-awesome/6.4.0/css/all.min.css">
<style>
  :root {
    --primary-color: #e74c3c;
    --secondary-color: #3498db;
    --dark-color: #2c3e50;
    --light-color: #ecf0f1;
    --gray-color: #95a5a6;
    --border-radius: 12px;
    --box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
    --transition: all 0.3s ease;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", sans-serif;
  }

  body {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    background: transparent;
    padding: 20px;
  }

  .card {
    width: 750px;
    background-color: white;
    border-radius: var(--border-radius);
    box-shadow: var(--box-shadow);
    overflow: hidden;
    position: relative;
    margin-bottom: 20px;
    border: 1px solid rgba(0, 0, 0, 0.02);
  }

  /* 装饰性条纹 */
  .decorative-stripe {
    position: absolute;
    width: 100%;
    height: 5px;
    background: linear-gradient(90deg, var(--primary-color) 0%, var(--secondary-color) 50%, #9b59b6 100%);
    top: 0;
    left: 0;
    z-index: 5;
  }

  /* 中部内容区域 */
  .content-section {
    padding: 30px;
  }

  .tag {
    position: absolute;
    top: 20px;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    color: white;
    display: flex;
    align-items: center;
    gap: 6px;
    backdrop-filter: blur(8px);
    background-color: rgba(0, 0, 0, 0.6);
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
    z-index: 2;
  }

  .platform-tag {
    right: 20px;
    border-left: 3px solid var(--secondary-color);
  }

  .header {
    display: flex;
    align-items: center;
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 1px dashed #eee;
  }

  .avatar {
    width: 56px;
    height: 56px;
    border-radius: 4px;
    margin-right: 16px;
    border: 2px solid #f0f0f0;
  }

  .user-info {
    display: flex;
    flex-direction: column;
    flex: 1;
  }

  .username {
    font-size: 16px;
    font-weight: bold;
    color: var(--dark-color);
    margin-bottom: 4px;
  }

  .time {
    font-size: 12px;
    color: var(--gray-color);
    margin-bottom: 4px;
  }

  .text {
    font-size: 15px;
    line-height: 1.7;
    color: #444;
    white-space: pre-wrap;
  }

  /* 内容文本 */
  .title {
    font-size: 22px;
    color: var(--dark-color);
    margin-bottom: 16px;
    line-height: 1.4;
    font-weight: 700;
    padding-left: 12px;
    border-left: 4px solid var(--secondary-color);
  }


  /* 评论区域 */
  .comments-section {
    padding: 0 30px 30px;
    border-top: 1px solid #eee;
    margin-top: 20px;
  }

  .comments-header {
    font-size: 18px;
    font-weight: 700;
    color: var(--dark-color);
    margin: 20px 0;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .comments-header i {
    color: var(--secondary-color);
  }

  /* ========== 评论样式 ========== */

  /* 主评论容器 */
  .comment-container {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
    padding-bottom: 20px;
    border-bottom: 1px dashed #eee;
  }

  .comment-container:last-child {
    border-bottom: none;
    margin-bottom: 0;
    padding-bottom: 0;
  }

  /* 头像区域 */
  .comment-avatar-wrapper {
    flex-shrink: 0;
    width: 48px;
    height: 48px;
  }

  .comment-avatar {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid #f0f0f0;
  }

  /* 评论内容区域 */
  .comment-content-wrapper {
    flex: 1;
    min-width: 0;
    /* 防止内容溢出 */
  }

  /* 作者信息行 */
  .comment-author-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  .comment-author-info {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    flex: 1;
  }

  .comment-author-name {
    font-weight: 600;
    font-size: 14px;
    color: var(--dark-color);
    line-height: 1.2;
  }

  /* 评论内容 */
  .comment-text {
    font-size: 14px;
    line-height: 1.6;
    color: #444;
    margin-bottom: 10px;
    word-wrap: break-word;
  }

  /* 评论时间 */
  .comment-time {
    font-size: 12px;
    color: var(--gray-color);
    white-space: nowrap;
    margin-left: 8px;
  }

  /* 统计信息 */
  .comment-stats {
    display: flex;
    gap: 16px;
    font-size: 12px;
    color: var(--gray-color);
  }

  .comment-stat {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  /* ========== 回复样式 ========== */

  .comment-replies {
    margin-top: 15px;
    margin-left: 12px;
    /* 与主评论内容对齐 */
    padding-left: 48px;
    /* 头像宽度 + 间距 */
    border-left: 2px solid #f0f0f0;
  }

  .reply-container {
    display: flex;
    gap: 12px;
    margin-bottom: 15px;
    padding-bottom: 15px;
    border-bottom: 1px dashed #f0f0f0;
  }

  .reply-container:last-child {
    border-bottom: none;
    margin-bottom: 0;
    padding-bottom: 0;
  }

  /* 回复头像区域 */
  .reply-avatar-wrapper {
    flex-shrink: 0;
    width: 40px;
    height: 40px;
    margin-top: 2px;
  }

  .reply-avatar {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid #f0f0f0;
  }

  /* 回复内容区域 */
  .reply-content-wrapper {
    flex: 1;
    min-width: 0;
  }

  /* 回复作者信息行 */
  .reply-author-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }

  .reply-author-info {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
    flex: 1;
  }

  .reply-author-name {
    font-weight: 600;
    font-size: 13px;
    color: var(--dark-color);
    line-height: 1.2;
  }

  /* 回复时间 */
  .reply-time {
    font-size: 11px;
    color: var(--gray-color);
    white-space: nowrap;
    margin-left: 6px;
  }

  /* 回复内容 */
  .reply-text {
    font-size: 13px;
    line-height: 1.5;
    color: #555;
    margin-bottom: 8px;
    word-wrap: break-word;
  }

  .sticker {
    vertical-align: text-bottom;
  }

  .sticker.small {
    height: 1.4rem;
  }

  .sticker.medium {
    height: 3.2rem;
  }

  /* 图片展示区域 */
  .images-container {
    margin: 20px 0;
  }

  .images-grid {
    display: grid;
    gap: 6px;
    width: 100%;
    overflow: hidden;
  }

  .images-grid img {
    border-radius: 8px;
  }

  .images-grid.single {
    grid-template-columns: 1fr;
  }

  /* 单图：竖屏图限制宽度为135px，高度自动缩放 */
  .images-grid.single .image-item {
    max-height: 650px;
  }

  .images-grid.single .video-cover {
    max-height: 1440px;
    position: relative;
    overflow: hidden;
    background: #eee;
  }

  .video-cover img {
    max-width: 100%;
  }

  /* 竖屏图 */
  .images-grid.single .image-item.aspect-ratio-portrait {
    max-width: 135px;
    height: auto;
  }

  /* 横屏图 */
  .images-grid.single .image-item.aspect-ratio-landscape {
    max-height: 650px;
    width: auto;
  }

  .images-grid.double {
    grid-template-columns: 1fr 1fr;
  }

  .images-grid.double .image-item {
    aspect-ratio: 1/1;
  }

  .images-grid.quad {
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
  }

  .images-grid.quad .image-item {
    aspect-ratio: 1/1;
  }

  .images-grid.nine {
    grid-template-columns: repeat(3, 1fr);
  }

  .images-grid.nine .image-item {
    aspect-ratio: 1/1;
  }

  .image-item {
    position: relative;
    overflow: hidden;
    background: #eee;
  }

  .image-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .more-count {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(2px);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    font-weight: bold;
  }

  /* 播放按钮装饰 */
  .play-btn-overlay {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 64px;
    height: 64px;
    background: rgba(255, 255, 255, 0.85);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    color: var(--primary-color);
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
  }

  /* 底部信息栏 */
  .footer-section {
    background-color: var(--dark-color);
    color: rgba(255, 255, 255, 0.8);
    padding: 15px 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
  }

  .footer-info {
    display: flex;
    gap: 15px;
    align-items: center;
  }

  .footer-brand {
    font-weight: 600;
    letter-spacing: 0.5px;
    color: white;
    display: flex;
    gap: 8px;
    align-items: center;
  }

  /* 统计数据区域 */
  .stats-container {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 25px;
  }

  .stat-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background-color: #f8f9fa;
    border-radius: 10px;
    border-left: 4px solid transparent;
  }

  .stat-item:nth-child(1) {
    border-left-color: #e74c3c;
  }

  .stat-item:nth-child(2) {
    border-left-color: #3498db;
  }

  .stat-item:nth-child(3) {
    border-left-color: #2ecc71;
  }

  .stat-item:nth-child(4) {
    border-left-color: #f39c12;
  }

  .stat-item:nth-child(5) {
    border-left-color: #9b59b6;
  }

  .stat-item:nth-child(6) {
    border-left-color: #1abc9c;
  }

  .stat-icon {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    color: white;
    flex-shrink: 0;
  }

  .stat-icon.play {
    background-color: #e74c3c;
  }

  .stat-icon.like {
    background-color: #3498db;
  }

  .stat-icon.reply {
    background-color: #2ecc71;
  }

  .stat-icon.fav {
    background-color: #f39c12;
  }

  .stat-icon.share {
    background-color: #9b59b6;
  }

  .stat-icon.coin {
    background-color: #1abc9c;
  }

  .stat-content {
    display: flex;
    flex-direction: column;
  }

  .stat-value {
    font-size: 17px;
    font-weight: 700;
    color: var(--dark-color);
    line-height: 1.1;
  }

  .stat-label {
    font-size: 12px;
    color: var(--gray-color);
    margin-top: 2px;
  }

  .live-photo {
    bottom: 8px;
    position: absolute;
    right: 8px;
    -webkit-box-align: center;
    -ms-flex-align: center;
    align-items: center;
    background-color: rgba(0, 0, 0, .5);
    border: none;
    border-radius: 2px;
    color: #fff;
    cursor: pointer;
    display: -webkit-box;
    display: -ms-flexbox;
    display: flex;
    height: 19px;
    outline: none;
    padding: 0 4px;
  }
</style>
<script defer>
  document.addEventListener('DOMContentLoaded', function () {
    document.querySelectorAll('.comments-section .images-grid.single .image-item').forEach(item => {
      const img = item.querySelector('img');
      if (img) {
        img.onload = function () {
          const aspectRatio = img.height / img.width;
          if (aspectRatio >= 0.9) {
            item.classList.add('aspect-ratio-portrait');
          } else {
            item.classList.add('aspect-ratio-landscape');
          }
        };
        if (img.complete) {
          img.onload();
        }
      }
    });
  });
</script>
